<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wrapped In Love | AHCollections4U</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    cursor:none;
    background:#1A1208;
}

/* CUSTOM CURSOR */
.cursor-dot{
    width:8px;height:8px;border-radius:50%;
    background:#C49A3C;
    position:fixed;top:0;left:0;
    pointer-events:none;z-index:9999;
    transform:translate(-50%,-50%);
}
.cursor-ring{
    width:36px;height:36px;border-radius:50%;
    border:1px solid #C49A3C;
    position:fixed;top:0;left:0;
    pointer-events:none;z-index:9998;
    transform:translate(-50%,-50%);
    opacity:0.6;
    transition:width .25s, height .25s, opacity .25s, border-color .25s;
}
body:has(a:hover) .cursor-ring{
    width:60px;height:60px;
    border-color:#E2C27D;
    opacity:1;
}

/* GRAIN / NOISE OVERLAY */
.noise{
    position:fixed;inset:0;
    pointer-events:none;
    z-index:5;
    opacity:.035;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:180px;
}

/* BACKGROUND */

.categories{

    min-height:100vh;

    position:relative;

    padding:120px 8% 100px;

    background:
    linear-gradient(
        rgba(40,18,14,.55),
        rgba(43,20,25,.6)
    ),
    url("category.jpeg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    overflow:hidden;
}

/* floating ambient glow blobs for depth */
.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(110px);
    pointer-events:none;
    z-index:0;
}
.glow-1{
    width:560px;height:560px;
    background:radial-gradient(circle,rgba(196,154,60,.28) 0%,transparent 70%);
    top:-120px; right:-100px;
}
.glow-2{
    width:480px;height:480px;
    background:radial-gradient(circle,rgba(184,96,63,.22) 0%,transparent 70%);
    bottom:-100px; left:-80px;
}

/* LOGO */

.logo{
    position:fixed;
    top:26px;
    left:30px;
    width:64px;
    height:64px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid #C49A3C;
    box-shadow:0 0 24px rgba(196,154,60,.4);
    z-index:50;
    opacity:0;
}

/* HEADING */

.heading{
    text-align:center;
    margin-bottom:90px;
    position:relative;
    z-index:1;
}

.heading-eyebrow{
    display:block;
    font-family:'Poppins',sans-serif;
    font-size:.85rem;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:#E2C27D;
    margin-bottom:18px;
    opacity:0;
}

.heading h1{

    font-family:'Allura',cursive;
    font-size:6.5rem;
    font-weight:400;
    color:#FBF3E6;
    line-height:1;
    text-shadow: 0 4px 30px rgba(196,154,60,.35);
    overflow:hidden;
}

.heading h1 span{
    display:inline-block;
    transform: translateY(110%);
}

.heading-line{
    width:0;
    height:1px;
    background:linear-gradient(to right, transparent, #C49A3C, transparent);
    margin:26px auto;
}

.heading p{

    margin-top:0;

    color:#EFE0C4;

    font-size:1.15rem;

    font-family:'Playfair Display',serif;
    font-style:italic;

    opacity:0;
}

/* GRID */

.cards{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:50px;

    position:relative;
    z-index:1;
}

/* CARD */

.card{

    opacity:0;

    transform:
    perspective(1200px)
    rotateX(25deg)
    translateY(140px)
    scale(.92);

    text-decoration:none;

    display:block;
}

.card-inner{

    position:relative;

    background:rgba(255,255,255,.10);

    backdrop-filter:blur(18px);

    border:1px solid rgba(226,194,125,.28);

    border-radius:28px;

    overflow:hidden;

    box-shadow:
    0 20px 50px rgba(0,0,0,.35);

    transition:box-shadow .5s ease, border-color .5s ease;

    transform-style:preserve-3d;
}

.card:hover .card-inner{
    border-color:rgba(226,194,125,.6);
    box-shadow:
    0 35px 80px rgba(0,0,0,.45),
    0 0 40px rgba(196,154,60,.18);
}

/* shimmer sweep on hover */
.card-inner::before{
    content:'';
    position:absolute;
    top:0; left:-150%;
    width:60%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.18), transparent);
    transform:skewX(-20deg);
    z-index:2;
    pointer-events:none;
    transition:left .9s ease;
}
.card:hover .card-inner::before{
    left:150%;
}

.card-img-wrap{
    overflow:hidden;
    position:relative;
}

.card img{

    width:100%;
    height:300px;

    object-fit:cover;

    display:block;

    transition:transform 1s cubic-bezier(.22,.61,.36,1);
}

.card:hover img{
    transform:scale(1.1);
}

.card-img-wrap::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(20,8,6,.65) 0%, transparent 45%);
    pointer-events:none;
}

.card-name{

    text-align:center;

    padding:24px;

    font-family:'Playfair Display',serif;

    font-size:1.5rem;

    color:#FBF3E6;

    position:relative;
}

.card-name::before{
    content:'';
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:0;
    height:1px;
    background:#C49A3C;
    transition:width .5s ease;
}
.card:hover .card-name::before{
    width:60px;
}

/* MOBILE */

@media(max-width:768px){

    .heading h1{
        font-size:4rem;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .card img{
        height:240px;
    }

    .logo{
        width:54px;
        height:54px;
    }
}

</style>
</head>

<body>

<div class="cursor-dot" id="dot"></div>
<div class="cursor-ring" id="ring"></div>
<div class="noise"></div>

<section class="categories">

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <img src="logo.png" class="logo" id="logo">

    <div class="heading">

        <span class="heading-eyebrow" id="eyebrow">Luxury Gifting Collections</span>

        <h1 id="heroHeading"><span>Wrapped In Love</span></h1>

        <div class="heading-line" id="headingLine"></div>

        <p id="heroSub">
            Explore our handpicked collections made to celebrate every moment.
        </p>

    </div>

    <div class="cards">

        <a href="jewellery.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="jewellery.jpeg"></div>
                <div class="card-name">Timeless Jewellery</div>
            </div>
        </a>

        <a href="hotwheels.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="hotwheels.jpeg"></div>
                <div class="card-name">HotWheels Vault</div>
            </div>
        </a>

        <a href="luxe.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="accessories.jpeg"></div>
                <div class="card-name">Luxe Accessories</div>
            </div>
        </a>

        <a href="personalized.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="personalized.jpeg"></div>
                <div class="card-name">Personalized Treasures</div>
            </div>
        </a>

        <a href="hampers.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="hampers.jpeg"></div>
                <div class="card-name">Signature Hampers</div>
            </div>
        </a>

        <a href="beauty.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="beauty.jpeg"></div>
                <div class="card-name">Beauty & Self-Care</div>
            </div>
        </a>

        <a href="fashion.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="fashion.jpeg"></div>
                <div class="card-name">Fashion Boutique</div>
            </div>
        </a>

        <a href="cozy-corner.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="cozy.jpeg"></div>
                <div class="card-name">Cozy Corners</div>
            </div>
        </a>

        <a href="charming.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="keepsakes.jpeg"></div>
                <div class="card-name">Charming Keepsakes</div>
            </div>
        </a>

        <a href="festival.html" class="card">
            <div class="card-inner">
                <div class="card-img-wrap"><img src="celebration.jpeg"></div>
                <div class="card-name">Celebration Collection</div>
            </div>
        </a>

    </div>

</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ===== CUSTOM CURSOR ===== */
const dot = document.getElementById('dot');
const ring = document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
});
(function loop(){
    rx += (mx-rx)*0.12;
    ry += (my-ry)*0.12;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(loop);
})();

/* ===== INTRO TIMELINE ===== */
const tl = gsap.timeline({ defaults:{ ease:'power3.out' } });

gsap.set('#logo', { y:-30, opacity:0 });
gsap.set('#eyebrow', { y:16, opacity:0 });
gsap.set('.heading h1 span', { y:'110%' });
gsap.set('#headingLine', { width:0, opacity:0 });
gsap.set('#heroSub', { y:14, opacity:0 });

tl
  .to('#logo', { y:0, opacity:1, duration:.8 })
  .to('#eyebrow', { y:0, opacity:1, duration:.6 }, '-=0.4')
  .to('.heading h1 span', { y:'0%', duration:1, ease:'power4.out' }, '-=0.2')
  .to('#headingLine', { width:140, opacity:1, duration:.7, ease:'power2.out' }, '-=0.3')
  .to('#heroSub', { y:0, opacity:1, duration:.7 }, '-=0.4');

/* ===== AMBIENT GLOW DRIFT ===== */
gsap.to('.glow-1', { x:40, y:30, duration:9, repeat:-1, yoyo:true, ease:'sine.inOut' });
gsap.to('.glow-2', { x:-30, y:-20, duration:11, repeat:-1, yoyo:true, ease:'sine.inOut' });

/* ===== CARD SCROLL REVEAL (staggered, depth) ===== */
const cards = gsap.utils.toArray('.card');

cards.forEach((card, i) => {
    gsap.to(card, {
        scrollTrigger: {
            trigger: card,
            start: 'top 88%',
            toggleActions: 'play none none reverse'
        },
        opacity: 1,
        rotateX: 0,
        y: 0,
        scale: 1,
        duration: 1.1,
        delay: (i % 2) * 0.12,
        ease: 'power3.out'
    });
});

/* ===== 3D TILT ON HOVER ===== */
cards.forEach(card => {
    const inner = card.querySelector('.card-inner');

    card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const cx = r.left + r.width/2;
        const cy = r.top + r.height/2;
        const dx = (e.clientX - cx) / (r.width/2);
        const dy = (e.clientY - cy) / (r.height/2);

        gsap.to(inner, {
            rotateY: dx * 10,
            rotateX: -dy * 8,
            duration: .5,
            ease: 'power2.out'
        });
    });

    card.addEventListener('mouseleave', () => {
        gsap.to(inner, {
            rotateY: 0,
            rotateX: 0,
            duration: .8,
            ease: 'elastic.out(1, 0.5)'
        });
    });
});

/* ===== PARALLAX ON SCROLL FOR BACKGROUND IMAGES ===== */
cards.forEach(card => {
    const img = card.querySelector('img');
    gsap.to(img, {
        yPercent: -10,
        ease: 'none',
        scrollTrigger: {
            trigger: card,
            start: 'top bottom',
            end: 'bottom top',
            scrub: true
        }
    });
});
</script>

</body>
</html>
